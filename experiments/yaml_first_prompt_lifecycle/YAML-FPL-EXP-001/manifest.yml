stop_procedure:
  trigger: STOP judgment at any step
  actions:
    - Record the reason for STOP using the standard record format
    - Preserve all artifacts generated up to that point
    - Do not discard Source A, YAML master, A′ artifacts, Estimated Execution Prompt Artifacts, B′ outputs, reviews, or recovery notes
    - No further generation or prompt derivation may occur after STOP
    - Human must explicitly choose one of the following restart options
  restart_options:
    - Protocol revision and restart from Step 0
    - Selective restart from the last approved step
    - Experiment termination with full record preservation