experiment_id: PAL-SEQ-EXP-001

research_record_status: reviewed
experiment_status: execution_completed
lock_status: locked
# No separate execution_status field is added; experiment_status is the
# single field of record for this purpose.
# execution_completed represents: Human Lock completed; Neutral Phase 1
# completed; Condition A reached full sequence completion (Step 3);
# Condition B reached partial completion and was stopped at Step 3
# (highest approved step: Step 2) after a human REJECT decision and a
# human decision not to authorize recovery. All registered steps for
# both conditions have been generated and evaluated.

overall_result_classification: promising_but_mixed_sequence_signal

protocol:
  file: docs/pal_prompt_layer_experiment_protocol.md
  version: null
  git_commit: 2212cec56fb7d94ab96e738c6ea201f7540db022
  # This commit is a pre-lock snapshot commit that fixes the Human-Lock-
  # preceding repository state, including the referenced shared protocol
  # at that point in time. It is not asserted to be a protocol-only
  # change commit.

fixed_terminology:
  c_definition: "C is model-side or execution-structure mediation that transforms A into A′."
  reconstruction_model: "A → (A + C) → A′ → B′"
  mismatch_or_drift_model: "A → (A + C) → A′ → B′ ≠ B"
  pal_prompt_layer_is_c_as_a_whole: false
  cip_directly_controls_c_or_a_prime: false
  ai_review_outputs_are_diagnostic_only: true
  human_final_authority: true

measurement_scope:
  condition_a: direct_delta_continuation
  condition_b: combined_pal_supported_sequence_workflow
  prompt_layer_alone: false
  comparison_question: >-
    From the same Shared Human-Approved Base Frame, which condition better
    preserves inherited state while executing one permitted delta at each step?

reference_design:
  mode: shared_sequence_reference
  neutral_base_state_establishment: true
  shared_only_at_base_frame: true
  branching_after_base_frame: true
  cross_condition_candidate_transfer: false

source_inputs:
  character_pal:
    name: Character PAL V2.0
    version: V2.0
    path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/character_pal_v2.0.pdf
    record_role: frozen_experiment_source_snapshot
  costume_pal:
    name: Costume PAL v2
    version: v2
    path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/costume_pal_v2.pdf
    record_role: frozen_experiment_source_snapshot
  background_pal:
    name: Background PAL v2
    version: v2
    path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/background_pal_v2.pdf
    record_role: frozen_experiment_source_snapshot
  sequence_pal:
    name: Sequence PAL v2
    version: v2
    path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/sequence_pal_v2.pdf
    record_role: frozen_experiment_source_snapshot
  # These four PAL Source Modules are frozen experiment source snapshots
  # used by PAL-SEQ-EXP-001. They are not a new shared PAL master, a
  # replacement of any shared PAL master, or a determination of the
  # standard shared-PAL storage location. The shared PAL master structure,
  # standard format, and versioning rules remain a separate repository
  # design decision to be considered later, outside this experiment's
  # Human Lock.
  primary_identity_anchor:
    identifier: rieko_primary_identity_anchor_01
    path: docs/assets/images/rieko_primary_identity_anchor_01.jpeg
    validation_status: provisional
    # registration_basis: this Primary Identity Anchor is registered as a
    # new entry for this experiment. No identity match or comparison
    # against any prior anchor (including PAL-PL-EXP-001's
    # rieko_anchor_candidate_02) is performed or claimed. Resemblance to
    # any prior anchor, if present, is not used as a basis for identifier
    # reuse, validation, or status promotion.
    registration_basis: new_registration_no_prior_anchor_match_claimed
    # R-1 status:
    #   new-registration basis: resolved
    #   identifier: resolved and recorded
    #   path: resolved (shared asset location)
    #   validation status: provisional
    # This image is a reusable Primary Identity Anchor supporting Rieko's
    # character identity in general, not a PAL-SEQ-EXP-001-specific
    # sequence reference. Placement in the shared asset area does not
    # constitute promotion to a Validated Identity Anchor; validation_status
    # remains provisional.
    # Neutral Phase 1 Shared Base Frame and candidate images for this
    # experiment are stored separately under the experiment directory, not
    # under docs/assets/images/.
    # Maintained distinction:
    #   Primary Identity Anchor != Shared Human-Approved Base Frame
    #   != Current Approved Sequence Reference != Validated Identity Anchor
    role:
      - identity_establishment
      - identity_reproduction_check
      - re_binding_after_identity_drift
    excluded_transfer_attributes:
      - silver_glitter_evening_dress
      - candlelit_luxury_venue
      - red_roses_and_event_decoration
      - cinematic_amber_lighting
      - event_specific_atmosphere
    # permitted_compositional_carryover is permitted ONLY for this Neutral
    # Base State and does not become a permanent Character PAL condition or
    # a Validated Identity Anchor attribute. Where close compositional
    # resemblance conflicts with clear two-hand visibility or suitability
    # for the registered sequence deltas, sequence-test suitability takes
    # priority over compositional resemblance.
    permitted_compositional_carryover:
      - overall_framing
      - general_body_orientation
      - facial_visibility

model_and_execution:
  model_name: null
  visible_version: null
  generation_settings: null
  session_policy_confirmed: true
  generation_order:
    method: alternating_within_step
    sequence:
      - A_step_01
      - B_step_01
      - B_step_02
      - A_step_02
      - A_step_03
      - B_step_03
    branch_continuation: "A_step_01 -> A_step_02 -> A_step_03 and B_step_01 -> B_step_02 -> B_step_03"
    stopped_branch_handling: "If one branch receives STOP SEQUENCE BRANCH, only the other registered branch continues; the stopped branch is not backfilled with a substitute candidate."
  experiment_date_range: null

neutral_base_state_establishment:
  status: completed
  condition_affiliation: neutral
  model_name: ChatGPT Images 2.0
  visible_version:
    chat_model: GPT-5.5 Thinking
    image_generator_label: ChatGPT Images 2.0
    backend_snapshot: not_exposed
  session_id: PAL-SEQ-EXP-001-neutral-phase-1-chat-01
  # session_id is an experiment-assigned identifier used for record-keeping
  # in this protocol. It does not represent or expose any internal,
  # non-public ChatGPT session identifier.
  generation_settings:
    output_count_per_attempt: 1
    aspect_ratio: portrait
    requested_size: 1024x1536
    actual_output_dimensions: 1024x1536
    reference_image:
      identifier: rieko_primary_identity_anchor_01
      path: docs/assets/images/rieko_primary_identity_anchor_01.jpeg
    source_modules:
      - character_pal_v2.0.pdf
      - costume_pal_v2.pdf
      - background_pal_v2.pdf
      - sequence_pal_v2.pdf
    prompt_mode: exact_frozen_prompt
    maximum_total_attempts: 3
    prompt_revision_between_attempts: false
    settings_change_between_attempts: false
    seed: unavailable
  # actual_output_dimensions is recorded after the first generated image
  # is saved and its actual dimensions are confirmed. backend_snapshot and
  # seed are not exposed through the UI and are not guessed; they are
  # recorded as not_exposed / unavailable.
  # The following reference the fixed values already registered under
  # top-level source_inputs.* (see source_inputs.primary_identity_anchor
  # and source_inputs.character_pal / costume_pal / background_pal /
  # sequence_pal). These are not a new or duplicate Source definition.
  primary_identity_anchor: rieko_primary_identity_anchor_01
  source_modules:
    character_pal: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/character_pal_v2.0.pdf
    costume_pal: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/costume_pal_v2.pdf
    background_pal: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/background_pal_v2.pdf
    sequence_pal: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/source_modules/sequence_pal_v2.pdf
  scene_request: |
    Establish a Shared Human-Approved Base Frame of Rieko using the approved Character PAL, Costume PAL, Background PAL, and Sequence PAL conditions, referencing the attached Primary Identity Anchor for character identity.
    Keep the overall framing, general body orientation, and facial visibility reasonably close to the Primary Identity Anchor, while replacing the anchor-specific silver evening dress, candlelit luxury venue, red roses and event decoration, cinematic amber lighting, and event-specific atmosphere with the approved white wedding dress and bright indoor photo-wedding studio conditions.
    Keep both hands clearly visible in a calm and stable starting pose suitable for the registered gaze-shift and left-hand delta-continuation steps. Where close compositional resemblance to the Primary Identity Anchor conflicts with clear visibility of both hands or suitability for the registered sequence deltas, sequence-test suitability takes priority.
    Visual details not explicitly fixed by the approved PAL Source Modules or this request may be resolved naturally by the generative model. Model-resolved details do not automatically become approved PAL conditions, part of the approved source identity, or attributes of a Validated Identity Anchor.
  exact_prompt: |
    Establish a Shared Human-Approved Base Frame of Rieko using the approved Character PAL, Costume PAL, Background PAL, and Sequence PAL conditions, referencing the attached Primary Identity Anchor for character identity.
    Keep the overall framing, general body orientation, and facial visibility reasonably close to the Primary Identity Anchor, while replacing the anchor-specific silver evening dress, candlelit luxury venue, red roses and event decoration, cinematic amber lighting, and event-specific atmosphere with the approved white wedding dress and bright indoor photo-wedding studio conditions.
    Keep both hands clearly visible in a calm and stable starting pose suitable for the registered gaze-shift and left-hand delta-continuation steps. Where close compositional resemblance to the Primary Identity Anchor conflicts with clear visibility of both hands or suitability for the registered sequence deltas, sequence-test suitability takes priority.
    Visual details not explicitly fixed by the approved PAL Source Modules or this request may be resolved naturally by the generative model. Model-resolved details do not automatically become approved PAL conditions, part of the approved source identity, or attributes of a Validated Identity Anchor.
  model_recording_policy:
    actual_model_recorded_before_first_generation: true
    visible_version_recorded_before_first_generation: true
    generation_settings_recorded_before_first_generation: true
    settings_frozen_for_all_neutral_phase_attempts: true
    settings_change_between_attempts: false
  maximum_total_attempts: 3
  prompt_revision_between_attempts: false
  generation_settings_change_between_attempts: false
  selection_rule: first_candidate_passing_all_required_base_state_checks
  stop_if_no_candidate_passes: true
  rejected_candidates_retained_as_evidence: true
  realized_attempts: 1
  selected_base_frame: attempt_01
  selected_base_frame_asset_path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/neutral_phase_1/attempt_01_shared_base_frame.png
  approval_decision: approve_as_shared_human_approved_base_frame
  base_state_check_results:
    attempt_01:
      character_identity: pass
      costume_state: pass
      background_state: pass
      composition: pass
      pose: pass
      both_hands_visible: pass
      facial_visibility: pass
      initial_scene_state: pass
      suitability_for_gaze_shift_continuation: pass
      suitability_for_left_hand_delta_continuation: pass
      critical_identity_violation: false
  identity_anchor_status: unchanged
  counted_as_condition_candidate: false
  selected_before_condition_execution: true

conditions:
  condition_a:
    baseline: reconstructed_direct_delta_continuation
    prompt_layer_blocks: prohibited
    full_pal_redisclosure: false
    primary_deltas_frozen_before_execution: true
    selective_reinjection_rule_pre_registered: true
    human_baseline_approval: true
    final_branch_status: completed
    highest_approved_step: step_03_gaze_to_left_hand
  condition_b:
    workflow:
      - GPT_compilation
      - Claude_direct_audit
      - separate_GPT_over_reconstruction_review
      - human_decision
      - reduced_delta_only_execution
    result_attribution: combined_workflow
    final_branch_status: stopped
    highest_approved_step: step_02_raise_left_hand
    branch_completion: partial

condition_b_review_policy:
  primary_attempt:
    gpt_compilation: required_each_step
    claude_direct_audit: required_each_step
    separate_gpt_supplementary_review: required_each_step
    human_pre_execution_decision: required_each_step
  recovery_attempt:
    revised_package_required: true
    claude_delta_review: required
    separate_gpt_repeat_review: conditional_on_new_claude_revision_or_human_request
    human_pre_execution_decision: required

steps:
  - step_id: step_01_gaze_toward_viewer
    permitted_delta: slight_gaze_shift_toward_viewer
  - step_id: step_02_raise_left_hand
    permitted_delta: slight_left_hand_raise
  - step_id: step_03_gaze_to_left_hand
    permitted_delta: gaze_toward_raised_left_hand

prompt_freeze_policy:
  primary_deltas:
    frozen_before_execution: true
  primary_prompt_construction_rule:
    frozen_before_execution: true
  inherited_state:
    recorded_before_each_step: true
  selective_reinjection:
    permitted_only_after_observed_drift: true
    rule_pre_registered: true
    exact_text_recorded_before_execution: true
    human_authorization_required: true

sequence_decisions:
  approve: APPROVE_FOR_SEQUENCE_CONTINUATION
  reject: REJECT_FOR_SEQUENCE_CONTINUATION
  stop: STOP_SEQUENCE_BRANCH

candidate_counts:
  planned_primary_candidates: 6
  realized_primary_candidates: 6
  maximum_permitted_recovery_candidates: 6
  realized_recovery_candidates: 0
  maximum_possible_generated_candidates: 12
  realized_total_generated_candidates: 6
  unrealized_primary_candidates_due_to_upstream_stop: 0
  maximum_registered_recovery_capacity: 6
  recovery_opportunities_triggered_by_rejection: 1
  declined_recovery_opportunities: 1
  # maximum_registered_recovery_capacity (6) is the theoretical maximum
  # recovery capacity registered for the experiment (one recovery
  # attempt permitted per primary step across both conditions).
  # recovery_opportunities_triggered_by_rejection (1) is the number of
  # times a primary candidate was actually rejected, making a recovery
  # decision applicable (Condition B Step 3).
  # declined_recovery_opportunities (1) is the number of triggered
  # recovery opportunities where the human operator did not authorize a
  # recovery attempt (Condition B Step 3: recovery_attempt_authorized:
  # false). realized_recovery_candidates (0) remains the count of
  # recovery candidates actually generated.

branch_rule:
  later_step_requires_prior_step_approval: true
  rejected_candidate_may_become_reference: false
  stopped_branch_may_be_backfilled: false

condition_a_recovery_policy:
  permitted: true
  maximum_recovery_attempts_per_step: 1
  same_sequence_reference_required: true
  same_permitted_delta_required: true
  selective_reinjection_permitted: true
  selective_reinjection_basis: observed_drift_only
  uses_prompt_layer_blocks: false
  uses_claude_audit: false
  uses_separate_gpt_supplementary_review: false
  human_approval_required: true
  rejected_candidate_may_become_reference: false

condition_b_recovery_policy:
  permitted: true
  maximum_recovery_attempts_per_step: 1
  same_sequence_reference_required: true
  same_permitted_delta_required: true
  selective_reinjection_permitted: true
  selective_reinjection_basis: observed_drift_only
  uses_combined_review_workflow: true
  human_approval_required: true
  exact_final_execution_package_recorded_before_execution: true
  rejected_candidate_may_become_reference: false

reject_transition_policy:
  trigger: reject_for_sequence_continuation
  human_decides_one_of:
    - authorize_recovery_attempt
    - stop_sequence_branch
  decision_field: post_reject_action
  post_reject_action_scope: attempt_linked_branch_transition
  stop_sequence_branch_is_branch_level_terminal: true

# branch_counts is non-exclusive: branches_with_partial_progress may overlap
# with stopped_branches (a branch can reach partial progress and then stop).
branch_counts:
  registered_branches: 2
  completed_branches: 1
  stopped_branches: 1
  incomplete_branches_with_partial_progress: 1
  # Definition: incomplete_branches_with_partial_progress counts branches
  # that did NOT reach full sequence completion but approved at least one
  # step before stopping (exclusive of completed_branches). Condition A
  # is excluded because it reached full completion (completed_branches).
  # Condition B is included (approved Steps 1-2, stopped before Step 3
  # completion). This field is therefore exclusive of completed_branches
  # by definition, not merely non-overlapping by coincidence.
  # stopped_branches and incomplete_branches_with_partial_progress may
  # still overlap with each other: a branch can stop with zero approved
  # steps (not partial) or stop after partial progress (both stopped and
  # partial, as Condition B is here).

# Maps to result.md "## Quantitative Outcome Status":
#   realized_primary_candidates      -> primary delta-execution success rate (denominator)
#   realized_recovery_candidates     -> recovery success rate (denominator)
# Branch completion rate uses branch_counts, not candidate_counts. See branch_counts above.

session_policy:
  one_chat_per_condition_branch: true
  rejected_candidate_not_reused_as_reference: true
  cross_condition_context_sharing: false
  conversation_history_as_possible_confounder: recorded

evaluation:
  condition_blinded: true
  evaluation_branch_ids_are_condition_blinded: true
  reference_frame_visible: true
  permitted_delta_visible: true
  exact_prompt_hidden: true
  review_history_hidden: true

human_final_authority: true

# ============================================================
# STEP EXECUTION RECORDS
# Individual per-step generation and decision records for Condition A
# and Condition B. These are factual execution records, not theory or
# protocol redefinitions.
#
# generated_candidate_asset_path is null for all six step records below,
# with asset_registration_status: pending_human_file_placement. This
# reflects that the generated candidate images have not yet been placed
# in the repository by the human operator, not an assumption about their
# eventual path, filename, or format. Paths must not be guessed or
# pre-filled before the images are actually placed.
#
# Each step record distinguishes two prompt-related fields:
#   exact_delivery_text       — the full message actually sent to the
#                                branch chat
#   model_facing_instruction  — the core image-editing instruction
#                                within that message
# These fields are conceptually distinct even when their content would
# be identical. Both are null with
# prompt_resolution_status: unresolved_pending_direct_transcription_from_branch_chat
# for all six steps below (Condition A Step 1-3, Condition B Step 2-3 at
# the step level; Condition B Step 1 at the technical_execution_event
# level — see step_01 below, which manages its prompt fields per event
# rather than at the step level, since the step spans a timeout event
# and a successful retry event with different delivery wording).
#
# This unresolved status reflects that the exact wording has not been
# directly transcribed from, and verified against, the actual branch
# chat message log for each step — not that no record of the wording
# exists in this conversation. Where a registered baseline or template
# text exists, it is recorded separately as registered_baseline_prompt_text
# and must not be treated as a confirmed exact_delivery_text or
# model_facing_instruction.
# ============================================================

step_execution_records:

  condition_a:

    step_01:
      condition: A
      step_id: step_01_gaze
      attempt_type: primary
      attempt_number: 1
      current_approved_sequence_reference:
        source: neutral_phase_1_attempt_01
        asset_path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/neutral_phase_1/attempt_01_shared_base_frame.png
      exact_delivery_text: null
      model_facing_instruction: null
      prompt_resolution_status: unresolved_pending_direct_transcription_from_branch_chat
      registered_baseline_prompt_text: "Shift only her gaze slightly toward the viewer. Preserve the current head orientation, body orientation, hand positions, expression, costume, background, lighting, and composition."
      # registered_baseline_prompt_text is a registered template/baseline
      # text and must not be treated as a confirmed exact_delivery_text or
      # model_facing_instruction. The actual exact_delivery_text and
      # model_facing_instruction must be transcribed from the Condition A
      # branch chat.
      generated_candidate_id: condition_a_step_01_attempt_01
      generated_candidate_asset_path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/condition_a/step_01/condition_a_step_01_gaze_to_viewer_primary_01.png
      asset_registration_status: placed
      asset_format: png
      candidate_realized: true
      candidate_counted: true
      results:
        character_identity: pass
        costume_continuity: pass
        background_continuity: pass
        composition_continuity: null
        pose_continuity: null
        hand_position_continuity: null
        delta_execution: warning
        sequence_continuity: warning
        prohibited_simultaneous_change: null
        critical_identity_violation: false
      human_candidate_decision: approve_for_sequence_continuation
      becomes_next_sequence_reference: true
      branch_status: active
      post_reject_action: not_applicable
      notes: "Identity, costume, and background succeeded. Delta execution and sequence continuity were rated WARNING rather than PASS."

    step_02:
      condition: A
      step_id: step_02_left_hand
      attempt_type: primary
      attempt_number: 1
      current_approved_sequence_reference:
        source: condition_a_step_01_attempt_01
        asset_path: null
      exact_delivery_text: null
      model_facing_instruction: null
      prompt_resolution_status: unresolved_pending_direct_transcription_from_branch_chat
      registered_baseline_prompt_text: "Raise only her left hand slightly and naturally. Preserve the inherited gaze, head orientation, body orientation, right-hand position, expression, costume, background, lighting, and composition."
      generated_candidate_id: condition_a_step_02_attempt_01
      generated_candidate_asset_path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/condition_a/step_02/condition_a_step_02_raise_hand_primary_01.png
      asset_registration_status: placed
      asset_format: png
      candidate_realized: true
      candidate_counted: true
      results:
        character_identity: pass
        costume_continuity: pass
        background_continuity: pass
        composition_continuity: null
        pose_continuity: null
        hand_position_continuity: pass_with_warning
        delta_execution: pass
        sequence_continuity: null
        prohibited_simultaneous_change: minor_unregistered_movement_in_non_target_hand
        critical_identity_violation: false
      human_candidate_decision: approve_for_sequence_continuation
      becomes_next_sequence_reference: true
      branch_status: active
      post_reject_action: not_applicable
      notes: "Registered hand delta succeeded. Minor unregistered movement observed in the non-target hand. Rated PASS WITH WARNING."

    step_03:
      condition: A
      step_id: step_03_gaze_to_raised_hand
      attempt_type: primary
      attempt_number: 1
      current_approved_sequence_reference:
        source: condition_a_step_02_attempt_01
        asset_path: null
      exact_delivery_text: null
      model_facing_instruction: null
      prompt_resolution_status: unresolved_pending_direct_transcription_from_branch_chat
      registered_baseline_prompt_text: "Shift only her gaze softly toward her raised left hand. Preserve the current head orientation, body orientation, both hand positions, expression, costume, background, lighting, and composition."
      generated_candidate_id: condition_a_step_03_attempt_01
      generated_candidate_asset_path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/condition_a/step_03/condition_a_step_03_gaze_to_raised_hand_primary_01.png
      asset_registration_status: placed
      asset_format: png
      candidate_realized: true
      candidate_counted: true
      results:
        character_identity: pass
        costume_continuity: pass
        background_continuity: pass
        composition_continuity: null
        pose_continuity: null
        hand_position_continuity: null
        delta_execution: pass
        sequence_continuity: pass
        prohibited_simultaneous_change: null
        critical_identity_violation: false
      human_candidate_decision: approve_for_sequence_continuation
      becomes_next_sequence_reference: true
      branch_status: completed
      post_reject_action: not_applicable
      notes: "Gaze-to-raised-hand delta succeeded. Sequence completion reached at Step 3."

  condition_b:

    step_01:
      condition: B
      step_id: step_01_gaze
      attempt_type: primary
      attempt_number: 1
      current_approved_sequence_reference:
        source: neutral_phase_1_attempt_01
        asset_path: experiments/pal_sequence_continuation/PAL-SEQ-EXP-001/neutral_phase_1/attempt_01_shared_base_frame.png
      # Step-level exact_delivery_text and model_facing_instruction are
      # not used for this step. Because step_01 spans a timeout event and
      # a successful retry event with different delivery wording, prompt
      # fields are managed per technical_execution_event below rather
      # than at the step level. See technical_execution_events for the
      # event-level exact_delivery_text and model_facing_instruction
      # fields, both unresolved pending direct transcription from the
      # branch chat.
      prompt_management_level: event_level
      registered_baseline_prompt_text: "Shift only her gaze slightly toward the viewer. Preserve the current head orientation, body orientation, both hand positions, expression, costume, background, lighting, framing, and composition."
      # registered_delta and reference image are unchanged by the wording
      # change below; only the delivery wording differs between the
      # timeout attempt and the successful retry.
      technical_execution_events:
        - execution_event_number: 1
          classification: technical_execution_failure_before_candidate_realization
          candidate_realized: false
          candidate_counted: false
          creates_new_attempt: false
          is_recovery_attempt: false
          relationship_to_primary_attempt: same_primary_attempt_technical_execution_event
          exact_delivery_text: null
          prompt_resolution_status: unresolved_pending_direct_transcription_from_branch_chat
          notes: "Initial execution attempt resulted in a technical timeout before any candidate image was realized. This is the delivery text of the long-form initial input that timed out, not the retry that produced the recorded candidate. This event does not create a new attempt (the realized candidate remains attempt_number: 1) and is not a recovery attempt."
        - execution_event_number: 2
          classification: same_primary_attempt_technical_retry
          candidate_realized: true
          candidate_counted: true
          creates_new_attempt: false
