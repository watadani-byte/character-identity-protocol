# ============================================================
# OPERATIONAL LIMITATIONS
# ============================================================

operational_limitations:
  left_right_interpretation_ambiguity:
    description: >-
      The experiment revealed an operational ambiguity in left-right
      interpretation. References to a character's "left hand" or "right
      hand" may be interpreted from the character's anatomical
      perspective, the viewer's screen perspective, or the visible
      position of the hand within the image. During the experiment,
      human correction was required when describing which hand had
      moved.
    impact: >-
      This ambiguity did not cause a critical identity failure, but it
      may affect delta registration, prompt construction, human
      evaluation, cross-condition comparison, and sequence
      traceability.
    recommendation: >-
      Future model-facing instructions should use visually unambiguous
      wording where appropriate, for example: "the raised hand"; "the
      character's left hand, visible on the right side of the image";
      or "the hand nearest the right edge of the frame." The registered
      anatomical target must remain fixed in the experiment record. A
      visually clearer model-facing expression may be used only when it
      does not alter the registered delta.
    classification: execution_and_annotation_limitation
    redefines_theory: false

