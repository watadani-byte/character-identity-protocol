    small gold stud earrings, slim elegant figure,
    warm neutral skin tone, anime style

  ssot_note: >
    This YAML is the structural SSOT for Rieko.
    The minimal_prompt field is a projection of this definition.
    Do not edit YAML to match English prompt.
    When generation quality degrades, return to this YAML source.

  pal_registration:
